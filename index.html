<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y Gyi Social Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --tg-blue: #2481cc; --tg-bg: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--tg-bg); }
        .hidden { display: none !important; }
        #auth-container { max-width: 400px; margin: 50px auto; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: var(--tg-blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #app-container { display: flex; height: 100vh; }
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<div id="auth-container">
    <h2 id="auth-title" style="text-align:center;">Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <div id="signup-fields" class="hidden">
        <input type="text" id="username" placeholder="Choose Username">
    </div>
    <button class="auth-btn" id="main-btn">Login</button>
    <p id="toggle-text" style="text-align:center; cursor:pointer; color:var(--tg-blue); margin-top:15px;">Don't have an account? Sign Up</p>
</div>

<div id="app-container" class="hidden">
    <div id="sidebar">
        <div style="padding:15px; background:var(--tg-blue); color:white;">
            <span id="user-display">Loading...</span>
            <button onclick="logout()" style="float:right; color:white; background:none; border:1px solid white; cursor:pointer;">Logout</button>
        </div>
        <div style="padding:10px;">
            <button onclick="document.getElementById('st-up').click()" style="width:100%; padding:10px; cursor:pointer;">+ Post Story</button>
            <input type="file" id="st-up" hidden onchange="uploadStory(this)">
        </div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; background:#e5ddd5;">
        <div id="messages" style="flex:1; overflow-y:auto; padding:20px;"></div>
        <div style="padding:15px; background:white; display:flex; gap:10px;">
            <input type="text" id="m-in" placeholder="Message...">
            <button onclick="sendMsg()" style="padding:10px 20px; cursor:pointer;">🚀</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://qupnchemjomloiiqrhbe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_DIGdtGe326V90viVs5OxJg_Twzdq-O0';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const mainBtn = document.getElementById('main-btn');
    const toggleText = document.getElementById('toggle-text');
    let isSignUpMode = false;

    // Button နှိပ်လို့ရအောင် event listener နဲ့ သေချာချိတ်ထားပါတယ်
    toggleText.addEventListener('click', () => {
        isSignUpMode = !isSignUpMode;
        document.getElementById('auth-title').innerText = isSignUpMode ? "Sign Up" : "Login";
        mainBtn.innerText = isSignUpMode ? "Create Account" : "Login";
        toggleText.innerText = isSignUpMode ? "Already have an account? Login" : "Don't have an account? Sign Up";
        document.getElementById('signup-fields').classList.toggle('hidden', !isSignUpMode);
    });

    mainBtn.addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const username = document.getElementById('username').value;

        if (isSignUpMode) {
            const { error } = await supabase.auth.signUp({ email, password, options: { data: { username } } });
            if (error) alert(error.message); else alert("Registration success! You can login.");
        } else {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message); else checkUser();
        }
    });

    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.user_metadata.username || user.email;
        }
    }

    async function logout() { await supabase.auth.signOut(); location.reload(); }
    async function sendMsg() {
        const val = document.getElementById('m-in').value;
        if(val) await supabase.from('messages').insert([{ content: val, type: 'text' }]);
        document.getElementById('m-in').value = '';
    }

    checkUser();
</script>
</body>
</html>
