<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y Gyi Social Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --tg-blue: #2481cc; --tg-bg: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--tg-bg); }
        .hidden { display: none !important; }
        
        /* Auth Page */
        #auth-page { max-width: 400px; margin: 80px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--tg-blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Main App */
        #app-main { display: flex; height: 100vh; }
        #sidebar { width: 320px; background: white; border-right: 1px solid #eee; display: flex; flex-direction: column; }
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        
        /* Stories Bar */
        #stories-bar { display: flex; gap: 15px; padding: 15px; border-bottom: 1px solid #f0f0f0; overflow-x: auto; }
        .story-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--tg-blue); flex-shrink: 0; overflow: hidden; cursor: pointer; }
        .story-circle img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="auth-page">
    <h2>Welcome</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="text" id="user-name" class="hidden" placeholder="Username (For Sign Up)">
    <button class="btn" id="auth-btn" onclick="handleAuth()">Login</button>
    <p onclick="toggleAuth()" id="toggle-text" style="color: var(--tg-blue); cursor: pointer; margin-top: 15px;">Don't have an account? Sign Up</p>
</div>

<div id="app-main" class="hidden">
    <div id="sidebar">
        <div style="padding: 15px; background: var(--tg-blue); color: white;">
            <span>Y Gyi Social</span>
            <button onclick="logout()" style="float: right;">Logout</button>
        </div>
        <div id="stories-bar">
            <div class="story-circle" onclick="document.getElementById('st-file').click()" style="display: flex; align-items: center; justify-content: center; background: #eee;">+</div>
            <input type="file" id="st-file" hidden onchange="uploadStory(this)">
        </div>
        <div id="user-list" style="overflow-y: auto; flex: 1;">
            </div>
    </div>
    <div id="chat-area">
        <div id="messages" style="flex: 1; overflow-y: auto; padding: 20px;"></div>
        <div style="padding: 15px; background: white; display: flex; gap: 10px;">
            <input type="text" id="m-input" placeholder="Write a message...">
            <button class="btn" style="width: 60px;" onclick="sendMsg()">🚀</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://qupnchemjomloiiqrhbe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_DIGdtGe326V90viVs5OxJg_Twzdq-O0';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isSignMode = false;

    function toggleAuth() {
        isSignMode = !isSignMode;
        document.getElementById('user-name').classList.toggle('hidden', !isSignMode);
        document.getElementById('auth-btn').innerText = isSignMode ? "Sign Up" : "Login";
        document.getElementById('toggle-text').innerText = isSignMode ? "Already have an account? Login" : "Don't have an account? Sign Up";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const username = document.getElementById('user-name').value;

        if (isSignMode) {
            const { error } = await supabase.auth.signUp({ email, password, options: { data: { username } } });
            if (error) alert(error.message); else alert("Check your email!");
        } else {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message); else showApp();
        }
    }

    async function showApp() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('app-main').classList.remove('hidden');
        }
    }

    async function logout() { await supabase.auth.signOut(); location.reload(); }

    // အက်ပ်ဖွင့်လျှင် အကောင့်ဝင်ထားသလား စစ်ဆေးခြင်း
    supabase.auth.onAuthStateChange((event, session) => { if (session) showApp(); });
</script>
</body>
</html>
